name: network-refresh

# Daily cloud refresh of the Contact Master Search.
# Runs on GitHub's servers, so it works whether or not Josh's laptop is on.
# Pulls current Ghost members + re-scrapes the article catalogue (live), rebuilds
# the fused people dataset from the encrypted source bundle, re-encrypts, and pushes
# (which auto-deploys GitHub Pages). Ghost only — no Mailchimp.

on:
  schedule:
    - cron: "0 11 * * *"   # 11:00 UTC daily = 7am ET (EDT) / 6am ET (EST)
  workflow_dispatch:        # allow manual "Run workflow" from the Actions tab

permissions:
  contents: write

concurrency:
  group: network-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install --quiet cryptography openpyxl

      - name: Restore secrets + decrypt source bundle
        env:
          GHOST_ADMIN_KEY: ${{ secrets.GHOST_ADMIN_KEY }}
          VC_NETWORK_PASS: ${{ secrets.VC_NETWORK_PASS }}
        run: |
          mkdir -p private
          printf '%s' "$GHOST_ADMIN_KEY" > private/.ghost_admin_key
          python3 bundle_sources.py unpack

      - name: Pull shared edits from the Google Sheet store
        env:
          OVERRIDES_URL: ${{ secrets.OVERRIDES_URL }}
          VC_NETWORK_PASS: ${{ secrets.VC_NETWORK_PASS }}
        run: |
          if [ -n "$OVERRIDES_URL" ]; then
            curl -fsSL --get "$OVERRIDES_URL" --data-urlencode "pass=$VC_NETWORK_PASS" \
              -o private/people_overrides.json \
              && echo "fetched shared edits ($(wc -c < private/people_overrides.json) bytes)" \
              || echo "WARNING: could not fetch shared edits; continuing without"
          else
            echo "OVERRIDES_URL not set yet — skipping shared-edit pull"
          fi

      - name: Pull Mailchimp unsubscribes (live)
        env:
          MAILCHIMP_KEY: ${{ secrets.MAILCHIMP_KEY }}
        run: |
          if [ -n "$MAILCHIMP_KEY" ]; then
            python3 mailchimp_unsubs.py || echo "WARNING: Mailchimp unsubscribe pull failed; using bundled unsubscribed_source.csv"
            python3 mailchimp_engagement.py || echo "WARNING: Mailchimp engagement pull failed; continuing without"
          else
            echo "MAILCHIMP_KEY not set — using bundled unsubscribed_source.csv"
          fi

      - name: Pull Donorbox donors (live)
        env:
          DONORBOX_KEY: ${{ secrets.DONORBOX_KEY }}
          DONORBOX_EMAIL: info@vitalcitynyc.org
        run: |
          if [ -n "$DONORBOX_KEY" ]; then
            python3 donorbox_donors.py || echo "WARNING: Donorbox pull failed; using bundled donors_source.csv"
          else
            echo "DONORBOX_KEY not set — using bundled donors_source.csv"
          fi

      - name: Pull current Ghost members (live)
        run: python3 ghost_members.py --apply

      - name: Refresh article catalogue (live)
        run: python3 scrape.py

      - name: Flag influential people (Wikipedia, incremental)
        run: |
          python3 build_network.py >/dev/null 2>&1 || true   # need people.json for the candidate list
          python3 wiki_influence.py || echo "WARNING: Wikipedia influence check failed; using cached flags"

      - name: Rebuild fused people dataset
        run: python3 build_network.py

      - name: Safety check — refuse to publish a gutted dataset
        env:
          VC_NETWORK_PASS: ${{ secrets.VC_NETWORK_PASS }}
        run: python3 sanity_check.py   # no fallback: a non-zero exit must stop the job before encrypt/commit

      - name: Encrypt for publishing
        env:
          VC_NETWORK_PASS: ${{ secrets.VC_NETWORK_PASS }}
        run: python3 encrypt_people.py

      - name: Commit & push if changed
        run: |
          # Defense-in-depth: never commit a missing/tiny encrypted file (real one is ~6 MB).
          if [ ! -s network/data.enc ] || [ "$(wc -c < network/data.enc)" -lt 100000 ]; then
            echo "ERROR: network/data.enc missing or suspiciously small — aborting commit."
            exit 1
          fi
          git config user.name "Vital City Bot"
          git config user.email "actions@users.noreply.github.com"
          git add data network/data.enc
          if git diff --cached --quiet; then
            echo "no changes to publish"
          else
            git commit -m "Daily Ghost refresh $(date -u '+%Y-%m-%d')"
            # Resilient publish: retry transient GitHub push errors (e.g. "fatal error in
            # commit_refs") and rebase past any commits that landed since checkout (a manual
            # push or an overlapping run). On a data-file conflict the fresh build wins (-X theirs).
            ok=
            for i in 1 2 3 4 5; do
              if git push; then ok=1; echo "pushed on attempt $i"; break; fi
              echo "push attempt $i failed; syncing with origin and retrying…"
              git pull --rebase --autostash -X theirs origin main || git rebase --abort || true
              sleep 8
            done
            [ -n "$ok" ] || { echo "ERROR: could not push after 5 attempts."; exit 1; }
          fi
